name: signal_mesh
description: >-
  Peer-to-peer encrypted mesh messenger. Fork of Signal concepts
  with no central server. Uses Kademlia DHT for peer discovery,
  Double Ratchet for E2E encryption, phone numbers as identifiers.
version: 0.1.0-alpha
repository: https://github.com/MelbourneDeveloper/dart_node

environment:
  sdk: ^3.10.0

dependencies:
  austerity: ^1.3.0
  nadz: ^0.0.7-beta
  node_preamble: ^2.0.2
  dart_node_core:
    path: ../packages/dart_node_core
  dart_node_ws:
    path: ../packages/dart_node_ws
  cryptography: ^2.7.0

dev_dependencies:
  dart_node_coverage:
    path: ../packages/dart_node_coverage
  test: ^1.24.0
