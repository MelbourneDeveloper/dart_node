# Dart test configuration
# Run with: dart test
#
# IMPORTANT: test/suite/* files are VSCode Extension Host tests that use
# Mocha TDD globals (suite, test, etc.) and can ONLY run via:
#   npm test
#
# Do NOT run test/suite/*.dart with `dart test` - they will fail with
# "method not found: 'suite'" because Mocha is not available.

# Must use node platform because state imports too_many_cooks_data
# which uses dart:js_interop (only available on JS platforms)
platforms: [node]

# Only run pure Dart tests (not VSCode Extension Host test/suite files)
paths:
  - test/extension_activation_test.dart

# Timeout for all tests
timeout: 60s

# Reporter
reporter: expanded
